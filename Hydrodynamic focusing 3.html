        <script>H5PIntegration = {"ajax":{"setFinished":"","contentUserData":""},"ajaxPath":"/h5p/ajax?action=","contents":{"cid-442637483":{"displayOptions":{"copy":false,"copyright":true,"embed":false,"export":false,"frame":true,"icon":false},"fullScreen":"1","jsonContent":"{\"iconType\":\"icon\",\"icon\":\"info\",\"color\":\"#559fed\",\"hotspots\":[{\"position\":{\"x\":80,\"y\":35.67879624470925},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>Sheath fluid is usually a buffered solution like PBS (Phosphate-Buffered Saline) that can prevent the sample from degrading, clumping, or dissolving. It is pumped into the flow cell under pressure, filling the chamber and exiting through a narrowing nozzle.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Text\",\"license\":\"U\",\"title\":\"Untitled Text\",\"authors\":[],\"changes\":[]},\"subContentId\":\"2f842dfd-39a4-4e6b-abf5-4eff7e199348\"}],\"header\":\"Sheath Fluid\"},{\"position\":{\"x\":40.400000000000006,\"y\":83.49881280732791},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"<p>The sheath fluid travels faster than the sample. Because they move in smooth, parallel layers, the two liquids do not mix. This is known as <strong>laminar flow</strong>. The pressure from the sheath fluid squeezes the sample into a narrow, central core. This forces the cells into single file so they pass through the center of the laser beam one by one.</p>\\n\"},\"library\":\"H5P.Text 1.1\",\"metadata\":{\"contentType\":\"Text\",\"license\":\"U\",\"title\":\"Untitled Text\",\"authors\":[],\"changes\":[]},\"subContentId\":\"48757c6a-f598-41cf-82a9-a7bccbc2db04\"}],\"header\":\"Hydrodynamic focusing\"},{\"position\":{\"x\":48.8,\"y\":5.918991245485363},\"alwaysFullscreen\":false,\"content\":[{\"params\":{\"text\":\"\\n<p style=\\\"text-align:left\\\">The cell suspension is injected through a central needle directly into the center of this moving sheath stream.</p>\\n\\n\"},\"library\"
